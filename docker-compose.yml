version: '3.8'

services:
  # 1. Database Container 
  mysql-db:
    image: mysql:8.0
    container_name: pos_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_system
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. Spring Boot Backend Container
  backend:
    build: ./pos-backend
    container_name: pos_backend_app
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/pos_system?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # 3. Next.js Frontend Container
  frontend:
    build: ./pos-frontend
    container_name: pos_frontend_app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data: